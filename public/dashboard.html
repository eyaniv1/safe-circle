<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Safe Circle</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/icon.svg" />
  <link rel="apple-touch-icon" href="/icons/icon.svg" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
    .container { max-width: 600px; margin: 0 auto; padding: 16px; }
    h1 { text-align: center; margin: 16px 0; font-size: 24px; }
    h1 span { color: #00d26a; }

    /* Setup panel */
    .setup { background: #16213e; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .setup h2 { font-size: 16px; margin-bottom: 12px; color: #aaa; }
    .row { display: flex; gap: 8px; margin-bottom: 8px; }
    .row input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #333; background: #0f3460; color: #fff; font-size: 14px; }
    .row input::placeholder { color: #666; }
    button { padding: 10px 16px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-add { background: #00d26a; color: #000; }
    .btn-alert { background: #e74c3c; color: #fff; font-size: 18px; width: 100%; padding: 16px; border-radius: 12px; margin: 12px 0; }
    .btn-alert:hover { background: #c0392b; }
    .btn-end { background: #f39c12; color: #000; font-size: 16px; width: 100%; padding: 14px; border-radius: 12px; margin: 12px 0; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-danger { background: #e74c3c; color: #fff; }
    .btn-copy { background: #3498db; color: #fff; }

    /* Member list */
    .member-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #16213e; border-radius: 8px; margin-bottom: 6px; }
    .member-name { font-weight: 600; }
    .member-links { display: flex; gap: 6px; align-items: center; }

    /* Status board */
    .status-board { margin-top: 16px; }
    .status-card { display: flex; align-items: center; gap: 12px; padding: 14px; border-radius: 12px; margin-bottom: 8px; font-size: 16px; }
    .status-card.ok { background: #0a3d1e; border-left: 5px solid #00d26a; }
    .status-card.trouble { background: #3d0a0a; border-left: 5px solid #e74c3c; animation: pulse 1s infinite; }
    .status-card.unknown { background: #2a2a2a; border-left: 5px solid #666; }
    .status-icon { font-size: 28px; }
    .status-name { flex: 1; font-weight: 600; }
    .status-time { font-size: 12px; color: #888; }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

    .alert-banner { background: #e74c3c; text-align: center; padding: 12px; border-radius: 12px; font-size: 18px; font-weight: 700; animation: pulse 1.5s infinite; margin-bottom: 12px; }
    .summary { display: flex; justify-content: center; gap: 24px; margin: 12px 0; font-size: 20px; font-weight: 700; }
    .summary .ok-count { color: #00d26a; }
    .summary .trouble-count { color: #e74c3c; }
    .summary .missing-count { color: #888; }

    .no-circle { text-align: center; padding: 40px; color: #666; }
    select { padding: 10px; border-radius: 8px; border: 1px solid #333; background: #0f3460; color: #fff; font-size: 14px; width: 100%; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Safe <span>Circle</span></h1>

    <!-- Circle selector / creator -->
    <div class="setup">
      <h2>Your Circle</h2>
      <div class="row">
        <select id="circle-select"><option value="">-- Select or create a circle --</option></select>
      </div>
      <div class="row">
        <input id="circle-name" placeholder="New circle name (e.g. Family)" />
        <button class="btn-add" onclick="createCircle()">Create</button>
      </div>
    </div>

    <!-- Members (shown when circle selected) -->
    <div id="circle-panel" style="display:none">
      <div class="setup">
        <h2>Members</h2>
        <div class="row">
          <input id="member-name" placeholder="Name *" style="flex:2" />
          <input id="member-area" list="cities-list" placeholder="Area (for auto-alert)" style="flex:2" />
          <datalist id="cities-list"></datalist>
        </div>
        <div class="row">
          <input id="member-phone" placeholder="Phone (optional)" style="flex:1" />
          <input id="member-email" placeholder="Email (optional)" style="flex:1" />
          <button class="btn-add" onclick="addMember()">Add</button>
        </div>
        <div id="member-list"></div>
      </div>

      <!-- Alert button / Status -->
      <div id="event-area"></div>
    </div>
  </div>

  <script>
    const API = '/api';
    let currentCircle = null;
    let pollInterval = null;

    // --- Circles ---
    async function loadCircles() {
      const res = await fetch(`${API}/circles`);
      const circles = await res.json();
      const sel = document.getElementById('circle-select');
      sel.innerHTML = '<option value="">-- Select or create a circle --</option>';
      circles.forEach(c => {
        sel.innerHTML += `<option value="${c.id}">${c.name}</option>`;
      });
      if (currentCircle) sel.value = currentCircle;
    }

    document.getElementById('circle-select').addEventListener('change', (e) => {
      currentCircle = e.target.value || null;
      document.getElementById('circle-panel').style.display = currentCircle ? 'block' : 'none';
      if (currentCircle) {
        loadMembers();
        startPolling();
      } else {
        stopPolling();
      }
    });

    async function createCircle() {
      const name = document.getElementById('circle-name').value.trim();
      if (!name) return;
      const res = await fetch(`${API}/circles`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name }),
      });
      const circle = await res.json();
      currentCircle = circle.id;
      document.getElementById('circle-name').value = '';
      await loadCircles();
      document.getElementById('circle-select').value = currentCircle;
      document.getElementById('circle-panel').style.display = 'block';
      loadMembers();
      startPolling();
    }

    // --- Members ---
    async function loadMembers() {
      const res = await fetch(`${API}/circles/${currentCircle}/members`);
      const members = await res.json();
      const container = document.getElementById('member-list');
      if (members.length === 0) {
        container.innerHTML = '<div style="color:#666;text-align:center;padding:12px">No members yet</div>';
        return;
      }
      container.innerHTML = members.map(m => {
        const details = [m.area, m.phone, m.email].filter(Boolean).join(' · ');
        return `<div class="member-item">
          <div>
            <span class="member-name">${m.name}</span>
            ${details ? `<div style="font-size:11px;color:#666;margin-top:2px">${details}</div>` : ''}
          </div>
          <div class="member-links">
            <button class="btn-copy btn-sm" onclick="shareLink('${m.id}', '${m.name}')">Send Setup Link</button>
            <button class="btn-danger btn-sm" onclick="removeMember('${m.id}')">X</button>
          </div>
        </div>`;
      }).join('');
    }

    async function addMember() {
      const name = document.getElementById('member-name').value.trim();
      const area = document.getElementById('member-area').value.trim();
      const phone = document.getElementById('member-phone').value.trim();
      const email = document.getElementById('member-email').value.trim();
      if (!name) return;
      await fetch(`${API}/circles/${currentCircle}/members`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, area, phone, email }),
      });
      document.getElementById('member-name').value = '';
      document.getElementById('member-area').value = '';
      document.getElementById('member-phone').value = '';
      document.getElementById('member-email').value = '';
      loadMembers();
    }

    async function removeMember(id) {
      if (!confirm('Remove this member?')) return;
      await fetch(`${API}/members/${id}`, { method: 'DELETE' });
      loadMembers();
    }

    function shareLink(memberId, name) {
      const baseUrl = location.origin;
      const msg = `Safe Circle setup for ${name}:\n\nOpen this link to set up your check-in:\n${baseUrl}/checkin/${memberId}\n\nOr save these one-tap shortcuts to your home screen:\n✅ I'm OK: ${baseUrl}/ok/${memberId}\n🔴 Trouble: ${baseUrl}/trouble/${memberId}`;

      if (navigator.share) {
        navigator.share({ title: 'Safe Circle', text: msg }).catch(() => {});
      } else {
        navigator.clipboard.writeText(msg).then(() => alert('Setup message copied! Paste it in WhatsApp or SMS to this person.'));
      }
    }

    // --- Events & Status ---
    function startPolling() {
      stopPolling();
      pollStatus();
      pollInterval = setInterval(pollStatus, 2000);
    }

    function stopPolling() {
      if (pollInterval) clearInterval(pollInterval);
    }

    async function pollStatus() {
      if (!currentCircle) return;
      const res = await fetch(`${API}/circles/${currentCircle}/status`);
      const data = await res.json();
      renderEventArea(data);
    }

    function renderEventArea(data) {
      const area = document.getElementById('event-area');

      if (!data.active) {
        area.innerHTML = `
          <button class="btn-alert" onclick="startEvent()">ALERT — Start Check-in</button>
        `;
        return;
      }

      const ok = data.members.filter(m => m.status === 'ok');
      const trouble = data.members.filter(m => m.status === 'trouble');
      const unknown = data.members.filter(m => m.status === 'unknown');

      // Sort: trouble first, then unknown, then ok
      const sorted = [...trouble, ...unknown, ...ok];

      area.innerHTML = `
        <div class="alert-banner">CHECK-IN ACTIVE</div>
        <div class="summary">
          <span class="ok-count">${ok.length} OK</span>
          <span class="trouble-count">${trouble.length} Trouble</span>
          <span class="missing-count">${unknown.length} Missing</span>
        </div>
        <div class="status-board">
          ${sorted.map(m => `
            <div class="status-card ${m.status}">
              <span class="status-icon">${m.status === 'ok' ? '✅' : m.status === 'trouble' ? '🔴' : '⚫'}</span>
              <span class="status-name">${m.name}</span>
              <span class="status-time">${m.time ? new Date(m.time).toLocaleTimeString() : 'No response'}</span>
            </div>
          `).join('')}
        </div>
        <button class="btn-end" onclick="endEvent('${data.eventId}')">End Check-in</button>
      `;
    }

    async function startEvent() {
      await fetch(`${API}/circles/${currentCircle}/events`, { method: 'POST' });
      pollStatus();
    }

    async function endEvent(id) {
      if (!confirm('End this check-in?')) return;
      await fetch(`${API}/events/${id}/end`, { method: 'POST' });
      pollStatus();
    }

    // Load cities for area autocomplete
    async function loadCities() {
      try {
        const res = await fetch('/cities.json');
        const cities = await res.json();
        const datalist = document.getElementById('cities-list');
        cities.forEach(c => {
          const opt = document.createElement('option');
          opt.value = c.label;
          datalist.appendChild(opt);
        });
      } catch (e) { console.error('Failed to load cities'); }
    }

    // Init
    loadCircles();
    loadCities();
  </script>
</body>
</html>
