<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Safe Circle</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/icon.svg" />
  <link rel="apple-touch-icon" href="/icons/icon.svg" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; padding-bottom: 40px; }
    .container { max-width: 600px; margin: 0 auto; padding: 12px; }
    h1 { text-align: center; margin: 12px 0; font-size: 22px; }
    h1 span { color: #00d26a; }

    .card { background: #16213e; border-radius: 12px; padding: 14px; margin-bottom: 12px; }
    .card h2 { font-size: 14px; color: #888; margin-bottom: 10px; }
    .row { display: flex; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
    input, select { padding: 10px; border-radius: 8px; border: 1px solid #333; background: #0f3460; color: #fff; font-size: 14px; min-width: 0; }
    input::placeholder { color: #666; }
    select { width: 100%; }
    button { padding: 8px 14px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
    .btn-add { background: #00d26a; color: #000; }
    .btn-edit { background: #3498db; color: #fff; }
    .btn-danger { background: #e74c3c; color: #fff; }
    .btn-send { background: #3498db; color: #fff; }
    .btn-alert { background: #e74c3c; color: #fff; font-size: 18px; width: 100%; padding: 16px; border-radius: 12px; margin: 8px 0; }
    .btn-end { background: #f39c12; color: #000; font-size: 16px; width: 100%; padding: 14px; border-radius: 12px; margin: 8px 0; }

    /* Circle header with edit/delete */
    .circle-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .circle-header select { flex: 1; }
    .circle-actions { display: flex; gap: 4px; }

    /* Member list */
    .member-item { background: #0f3460; border-radius: 8px; padding: 10px; margin-bottom: 6px; }
    .member-top { display: flex; justify-content: space-between; align-items: center; }
    .member-name { font-weight: 600; font-size: 15px; }
    .member-details { font-size: 11px; color: #888; margin-top: 3px; }
    .member-actions { display: flex; gap: 4px; }

    /* Status board */
    .status-card { display: flex; align-items: center; gap: 10px; padding: 12px; border-radius: 10px; margin-bottom: 6px; }
    .status-card.ok { background: #0a3d1e; border-left: 4px solid #00d26a; }
    .status-card.trouble { background: #3d0a0a; border-left: 4px solid #e74c3c; animation: pulse 1s infinite; }
    .status-card.unknown { background: #2a2a2a; border-left: 4px solid #666; }
    .status-card.safe-zone { background: #1a1a2e; border-left: 4px solid #3498db; opacity: 0.6; }
    .safe-zone-label { font-size: 10px; color: #3498db; margin-left: 4px; }
    .status-icon { font-size: 22px; }
    .status-name { flex: 1; font-weight: 600; font-size: 14px; }
    .status-time { font-size: 11px; color: #888; }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

    .alert-banner { background: #e74c3c; text-align: center; padding: 10px; border-radius: 10px; font-size: 16px; font-weight: 700; animation: pulse 1.5s infinite; margin-bottom: 8px; }
    .summary { display: flex; justify-content: center; gap: 16px; margin: 8px 0; font-size: 18px; font-weight: 700; }
    .summary .ok-count { color: #00d26a; }
    .summary .trouble-count { color: #e74c3c; }
    .summary .missing-count { color: #888; }

    .empty { text-align: center; color: #666; padding: 16px; font-size: 14px; }

    /* Searchable dropdown */
    .area-picker { position: relative; flex: 1; min-width: 0; }
    .area-picker input { width: 100%; }
    .area-dropdown { display: none; position: absolute; top: 100%; left: 0; right: 0; max-height: 200px; overflow-y: auto; background: #0f3460; border: 1px solid #333; border-radius: 0 0 8px 8px; z-index: 50; -webkit-overflow-scrolling: touch; }
    .area-dropdown.open { display: block; }
    .area-option { padding: 10px 12px; cursor: pointer; font-size: 14px; border-bottom: 1px solid #1a1a3e; }
    .area-option:hover, .area-option.highlighted { background: #16213e; }
    .area-option mark { background: #00d26a; color: #000; border-radius: 2px; }

    /* Modal overlay for editing */
    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
    .modal.show { display: flex; }
    .modal-box { background: #16213e; border-radius: 12px; padding: 20px; width: 100%; max-width: 400px; }
    .modal-box h3 { margin-bottom: 12px; font-size: 16px; }
    .modal-box input { width: 100%; margin-bottom: 8px; }
    .modal-btns { display: flex; gap: 8px; margin-top: 12px; }
    .modal-btns button { flex: 1; padding: 10px; }
    .btn-cancel { background: #333; color: #fff; }
    .btn-save { background: #00d26a; color: #000; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Safe <span>Circle</span></h1>

    <!-- Circle selector -->
    <div class="card">
      <h2>Your Circle</h2>
      <div class="circle-header">
        <select id="circle-select"><option value="">-- Select or create --</option></select>
        <div class="circle-actions" id="circle-actions" style="display:none">
          <button class="btn-edit" onclick="editCircle()">Edit</button>
          <button class="btn-danger" onclick="deleteCircle()">Del</button>
        </div>
      </div>
      <div class="row">
        <input id="circle-name" placeholder="New circle name" style="flex:1" />
        <button class="btn-add" onclick="createCircle()">Create</button>
      </div>
    </div>

    <!-- Members -->
    <div id="circle-panel" style="display:none">
      <div class="card">
        <h2>Members</h2>
        <div class="row">
          <input id="member-name" placeholder="Name *" style="flex:1" />
          <div class="area-picker">
            <input id="member-area" placeholder="Area (type to search)" autocomplete="off" />
            <div class="area-dropdown" id="member-area-dropdown"></div>
          </div>
        </div>
        <div class="row">
          <input id="member-phone" placeholder="Phone" style="flex:1" />
          <input id="member-email" placeholder="Email" style="flex:1" />
          <button class="btn-add" onclick="addMember()">Add</button>
        </div>
        <div id="member-list"></div>
      </div>

      <div id="event-area"></div>
    </div>
  </div>

  <!-- Edit modal -->
  <div class="modal" id="modal">
    <div class="modal-box">
      <h3 id="modal-title">Edit</h3>
      <input id="modal-name" placeholder="Name" />
      <div class="area-picker">
        <input id="modal-area" placeholder="Area (type to search)" autocomplete="off" />
        <div class="area-dropdown" id="modal-area-dropdown"></div>
      </div>
      <input id="modal-phone" placeholder="Phone" />
      <input id="modal-email" placeholder="Email" />
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save" onclick="saveModal()">Save</button>
      </div>
    </div>
  </div>

  <script>
    const API = '/api';
    let currentCircle = null;
    let currentCircleName = '';
    let pollInterval = null;
    let modalCallback = null;

    // --- Modal ---
    function openModal(title, fields, callback) {
      document.getElementById('modal-title').textContent = title;
      document.getElementById('modal-name').value = fields.name || '';
      document.getElementById('modal-area').value = fields.area || '';
      document.getElementById('modal-phone').value = fields.phone || '';
      document.getElementById('modal-email').value = fields.email || '';
      // Show/hide fields based on type
      const isCircle = !fields.showAll;
      document.getElementById('modal-area').style.display = isCircle ? 'none' : '';
      document.getElementById('modal-phone').style.display = isCircle ? 'none' : '';
      document.getElementById('modal-email').style.display = isCircle ? 'none' : '';
      modalCallback = callback;
      document.getElementById('modal').classList.add('show');
      document.getElementById('modal-name').focus();
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('show');
      modalCallback = null;
    }

    function saveModal() {
      if (modalCallback) {
        modalCallback({
          name: document.getElementById('modal-name').value.trim(),
          area: document.getElementById('modal-area').value.trim(),
          phone: document.getElementById('modal-phone').value.trim(),
          email: document.getElementById('modal-email').value.trim(),
        });
      }
      closeModal();
    }

    // --- Circles ---
    async function loadCircles() {
      const res = await fetch(`${API}/circles`);
      const circles = await res.json();
      const sel = document.getElementById('circle-select');
      sel.innerHTML = '<option value="">-- Select or create --</option>';
      circles.forEach(c => {
        sel.innerHTML += `<option value="${c.id}">${c.name}</option>`;
      });
      if (currentCircle) sel.value = currentCircle;
      document.getElementById('circle-actions').style.display = currentCircle ? 'flex' : 'none';
    }

    document.getElementById('circle-select').addEventListener('change', (e) => {
      currentCircle = e.target.value || null;
      currentCircleName = e.target.options[e.target.selectedIndex]?.text || '';
      document.getElementById('circle-panel').style.display = currentCircle ? 'block' : 'none';
      document.getElementById('circle-actions').style.display = currentCircle ? 'flex' : 'none';
      if (currentCircle) {
        loadMembers();
        startPolling();
      } else {
        stopPolling();
      }
    });

    async function createCircle() {
      const name = document.getElementById('circle-name').value.trim();
      if (!name) return;
      const res = await fetch(`${API}/circles`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name }),
      });
      const circle = await res.json();
      currentCircle = circle.id;
      currentCircleName = circle.name;
      document.getElementById('circle-name').value = '';
      await loadCircles();
      document.getElementById('circle-select').value = currentCircle;
      document.getElementById('circle-panel').style.display = 'block';
      loadMembers();
      startPolling();
    }

    function editCircle() {
      openModal('Edit Circle', { name: currentCircleName }, async (data) => {
        if (!data.name) return;
        await fetch(`${API}/circles/${currentCircle}`, {
          method: 'PUT', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: data.name }),
        });
        currentCircleName = data.name;
        loadCircles();
      });
    }

    async function deleteCircle() {
      if (!confirm(`Delete circle "${currentCircleName}" and all its members?`)) return;
      await fetch(`${API}/circles/${currentCircle}`, { method: 'DELETE' });
      currentCircle = null;
      currentCircleName = '';
      document.getElementById('circle-panel').style.display = 'none';
      stopPolling();
      loadCircles();
    }

    // --- Members ---
    async function loadMembers() {
      const res = await fetch(`${API}/circles/${currentCircle}/members`);
      const members = await res.json();
      const container = document.getElementById('member-list');
      if (members.length === 0) {
        container.innerHTML = '<div class="empty">No members yet</div>';
        return;
      }
      container.innerHTML = members.map(m => {
        const details = [m.area, m.phone, m.email].filter(Boolean).join(' · ');
        const visited = m.setup_visited ? '✅' : '❌';
        const okSet = m.ok_clicked ? '✅' : '❌';
        const troubleSet = m.trouble_clicked ? '✅' : '❌';
        const allReady = m.setup_visited && m.ok_clicked && m.trouble_clicked;
        return `<div class="member-item" style="${allReady ? '' : 'border-left:3px solid #f39c12;'}">
          <div class="member-top">
            <span class="member-name">${m.name}</span>
            <div class="member-actions">
              <button class="btn-send" style="font-size:11px;padding:5px 8px" data-action="share" data-id="${m.id}">Share</button>
              <button class="btn-edit" style="font-size:11px;padding:5px 8px" data-action="edit" data-id="${m.id}">Edit</button>
              <button class="btn-danger" style="font-size:11px;padding:5px 8px" data-action="remove" data-id="${m.id}">X</button>
            </div>
          </div>
          ${details ? `<div class="member-details">${details}</div>` : ''}
          <div class="member-details" style="margin-top:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            <span>${visited} Link</span>
            <span>${okSet} OK</span>
            <span>${troubleSet} Trouble</span>
            ${!allReady ? `<button style="font-size:10px;padding:2px 6px;background:#f39c12;color:#000;border:none;border-radius:4px;cursor:pointer" data-action="marksetup" data-id="${m.id}">Mark ready</button>` : ''}
          </div>
        </div>`;
      }).join('');
      // Store members for edit lookup
      window._members = members;

      // Event delegation for member action buttons
      container.querySelectorAll('[data-action]').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.dataset.id;
          const m = (window._members || []).find(x => x.id === id);
          switch (btn.dataset.action) {
            case 'share': shareLink(id, m ? m.name : ''); break;
            case 'edit': editMember(id); break;
            case 'remove': removeMember(id); break;
            case 'marksetup': markSetup(id); break;
          }
        });
      });
    }

    async function addMember() {
      const name = document.getElementById('member-name').value.trim();
      const area = document.getElementById('member-area').value.trim();
      const phone = document.getElementById('member-phone').value.trim();
      const email = document.getElementById('member-email').value.trim();
      if (!name) return;
      await fetch(`${API}/circles/${currentCircle}/members`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, area, phone, email }),
      });
      document.getElementById('member-name').value = '';
      document.getElementById('member-area').value = '';
      document.getElementById('member-phone').value = '';
      document.getElementById('member-email').value = '';
      loadMembers();
    }

    function editMember(id) {
      const m = (window._members || []).find(x => x.id === id);
      if (!m) return;
      openModal('Edit Member', { name: m.name, area: m.area, phone: m.phone, email: m.email, showAll: true }, async (data) => {
        if (!data.name) return;
        await fetch(`${API}/members/${id}`, {
          method: 'PUT', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });
        loadMembers();
      });
    }

    async function markSetup(id) {
      await fetch(`${API}/members/${id}/mark-setup`, { method: 'POST' });
      loadMembers();
    }

    async function removeMember(id) {
      if (!confirm('Remove this member?')) return;
      await fetch(`${API}/members/${id}`, { method: 'DELETE' });
      loadMembers();
    }

    function shareLink(memberId, name) {
      const url = `${location.origin}/checkin/${memberId}`;

      if (navigator.share) {
        navigator.share({ title: 'Safe Circle', url }).catch(() => {});
      } else {
        navigator.clipboard.writeText(url).then(() => alert('Link copied!'));
      }
    }

    // --- Events & Status ---
    function startPolling() {
      stopPolling();
      pollStatus();
      pollInterval = setInterval(pollStatus, 2000);
    }

    function stopPolling() {
      if (pollInterval) clearInterval(pollInterval);
    }

    async function pollStatus() {
      if (!currentCircle) return;
      const res = await fetch(`${API}/circles/${currentCircle}/status`);
      const data = await res.json();
      renderEventArea(data);
    }

    function renderEventArea(data) {
      const area = document.getElementById('event-area');

      if (!data.active) {
        area.innerHTML = `<button class="btn-alert" onclick="startEvent()">ALERT — Start Check-in</button>`;
        return;
      }

      const inZone = data.members.filter(m => m.inAlertZone !== false);
      const outZone = data.members.filter(m => m.inAlertZone === false);
      const ok = inZone.filter(m => m.status === 'ok');
      const trouble = inZone.filter(m => m.status === 'trouble');
      const unknown = inZone.filter(m => m.status === 'unknown');
      const sorted = [...trouble, ...unknown, ...ok];

      area.innerHTML = `
        <div class="alert-banner">CHECK-IN ACTIVE</div>
        <div class="summary">
          <span class="ok-count">${ok.length} OK</span>
          <span class="trouble-count">${trouble.length} Trouble</span>
          <span class="missing-count">${unknown.length} Missing</span>
        </div>
        ${sorted.map(m => `
          <div class="status-card ${m.status}">
            <span class="status-icon">${m.status === 'ok' ? '✅' : m.status === 'trouble' ? '🔴' : '⚫'}</span>
            <span class="status-name">${m.name}</span>
            <span class="status-time">${m.time ? new Date(m.time).toLocaleTimeString() : 'No response'}</span>
          </div>
        `).join('')}
        ${outZone.length > 0 ? `
          <div style="font-size:12px;color:#3498db;margin:10px 0 6px;text-align:center">Not in alert zone</div>
          ${outZone.map(m => `
            <div class="status-card safe-zone">
              <span class="status-icon">🔵</span>
              <span class="status-name">${m.name}<span class="safe-zone-label">${m.area || ''}</span></span>
              <span class="status-time">${m.status !== 'unknown' ? (m.status === 'ok' ? '✅' : '🔴') : ''}</span>
            </div>
          `).join('')}
        ` : ''}
        <button class="btn-end" onclick="endEvent('${data.eventId}')">End Check-in</button>
      `;
    }

    async function startEvent() {
      await fetch(`${API}/circles/${currentCircle}/events`, { method: 'POST' });
      pollStatus();
    }

    async function endEvent(id) {
      if (!confirm('End this check-in?')) return;
      await fetch(`${API}/events/${id}/end`, { method: 'POST' });
      pollStatus();
    }

    // Searchable area dropdown
    let allCities = [];

    async function loadCities() {
      try {
        const res = await fetch('/cities.json');
        allCities = (await res.json()).map(c => c.label).sort((a, b) => a.localeCompare(b, 'he'));
      } catch (e) {}
    }

    function setupAreaPicker(inputId, dropdownId) {
      const input = document.getElementById(inputId);
      const dropdown = document.getElementById(dropdownId);
      let highlightIdx = -1;

      input.addEventListener('focus', () => showDropdown(input, dropdown, ''));
      input.addEventListener('input', () => {
        highlightIdx = -1;
        showDropdown(input, dropdown, input.value);
      });

      input.addEventListener('keydown', (e) => {
        const items = dropdown.querySelectorAll('.area-option');
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          highlightIdx = Math.min(highlightIdx + 1, items.length - 1);
          updateHighlight(items, highlightIdx);
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          highlightIdx = Math.max(highlightIdx - 1, 0);
          updateHighlight(items, highlightIdx);
        } else if (e.key === 'Enter') {
          e.preventDefault();
          if (highlightIdx >= 0 && items[highlightIdx]) {
            input.value = items[highlightIdx].dataset.value;
            dropdown.classList.remove('open');
          }
        } else if (e.key === 'Escape') {
          dropdown.classList.remove('open');
        }
      });

      // Close on outside click
      document.addEventListener('click', (e) => {
        if (!input.contains(e.target) && !dropdown.contains(e.target)) {
          dropdown.classList.remove('open');
        }
      });
    }

    function showDropdown(input, dropdown, query) {
      const q = query.trim().toLowerCase();
      let filtered = allCities;
      if (q) {
        // Show items starting with query first, then containing
        const starts = allCities.filter(c => c.toLowerCase().startsWith(q));
        const contains = allCities.filter(c => !c.toLowerCase().startsWith(q) && c.toLowerCase().includes(q));
        filtered = [...starts, ...contains];
      }
      filtered = filtered.slice(0, 50); // Limit for performance

      if (filtered.length === 0) {
        dropdown.classList.remove('open');
        return;
      }

      dropdown.innerHTML = filtered.map((c, i) => {
        let display = c;
        if (q) {
          const idx = c.toLowerCase().indexOf(q);
          if (idx >= 0) {
            display = c.slice(0, idx) + '<mark>' + c.slice(idx, idx + q.length) + '</mark>' + c.slice(idx + q.length);
          }
        }
        return `<div class="area-option" data-value="${c}" data-idx="${i}">${display}</div>`;
      }).join('');

      dropdown.classList.add('open');

      // Click handler for options
      dropdown.querySelectorAll('.area-option').forEach(opt => {
        opt.addEventListener('click', () => {
          input.value = opt.dataset.value;
          dropdown.classList.remove('open');
        });
      });
    }

    function updateHighlight(items, idx) {
      items.forEach((el, i) => el.classList.toggle('highlighted', i === idx));
      if (items[idx]) items[idx].scrollIntoView({ block: 'nearest' });
    }

    // Init
    loadCities().then(() => {
      setupAreaPicker('member-area', 'member-area-dropdown');
      setupAreaPicker('modal-area', 'modal-area-dropdown');
    });
    loadCircles();
  </script>
</body>
</html>
