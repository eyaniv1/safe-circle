<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Trouble" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#e74c3c" />
  <title>Trouble</title>
  <link rel="icon" href="/icons/trouble.svg" />
  <link rel="apple-touch-icon" href="/icons/trouble.svg" />
  <style>
    * { margin: 0; padding: 0; }
    body { background: #e74c3c; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; }
    .icon { font-size: 100px; margin-bottom: 16px; }
    .text { font-size: 28px; font-weight: 700; }
    .sub { font-size: 16px; margin-top: 8px; opacity: 0.7; }
    .error { display: none; background: rgba(0,0,0,0.3); padding: 12px 20px; border-radius: 8px; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="icon">🔴</div>
  <div class="text">Sending Trouble...</div>
  <div class="sub" id="status">Reporting your status</div>
  <div class="error" id="error"></div>

  <script>
    const memberId = location.pathname.split('/trouble/')[1];

    async function report() {
      try {
        const res = await fetch(`/api/checkin/${memberId}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: 'trouble' }),
        });
        if (res.ok) {
          document.querySelector('.text').textContent = 'Trouble Reported';
          document.getElementById('status').textContent = 'Your circle has been notified';
          if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
          setTimeout(() => window.close(), 2000);
        } else {
          const err = await res.json();
          if (err.error === 'No active check-in event') {
            document.querySelector('.text').textContent = 'No active alert';
            document.getElementById('status').textContent = 'No check-in is active right now';
          } else {
            showError(err.error);
          }
        }
      } catch (e) {
        showError('Network error. Check your connection.');
      }
    }

    function showError(msg) {
      document.querySelector('.text').textContent = 'Error';
      const el = document.getElementById('error');
      el.textContent = msg;
      el.style.display = 'block';
    }

    report();
  </script>
</body>
</html>
