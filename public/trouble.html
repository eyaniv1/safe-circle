<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Trouble" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#e74c3c" />
  <title>Trouble</title>
  <link rel="icon" href="/icons/trouble-180.png" />
  <link rel="apple-touch-icon" href="/icons/trouble-180.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; transition: background 0.3s; }
    body.state-ok { background: #0a3d1e; }
    body.state-trouble { background: #2a0a0a; }
    body.state-loading { background: #1a1a2e; }
    .header { width: 100%; text-align: center; padding: 20px 16px; transition: background 0.3s; }
    .header.ok { background: #00d26a; color: #000; }
    .header.trouble { background: #e74c3c; color: #fff; }
    .header.loading { background: #333; }
    .header .icon { font-size: 40px; }
    .header .text { font-size: 22px; font-weight: 700; margin-top: 4px; }
    .header .sub { font-size: 13px; opacity: 0.7; margin-top: 4px; }
    .change-btn { margin: 16px; padding: 14px 28px; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; transition: transform 0.1s; display: none; }
    .change-btn:active { transform: scale(0.95); }
    .change-btn.to-trouble { background: #e74c3c; color: #fff; }
    .change-btn.to-ok { background: #00d26a; color: #000; }
    .error { display: none; color: #fff; background: rgba(0,0,0,0.3); padding: 12px 20px; border-radius: 8px; margin: 12px; text-align: center; }
    .circle-status { width: 100%; max-width: 500px; padding: 0 16px 16px; }
    .member-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; margin-bottom: 6px; }
    .member-row.ok { background: rgba(0,210,106,0.15); }
    .member-row.trouble { background: rgba(231,76,60,0.2); }
    .member-row.unknown { background: rgba(255,255,255,0.05); }
    .member-icon { font-size: 20px; }
    .member-name { flex: 1; font-weight: 600; font-size: 15px; }
    .member-time { font-size: 11px; color: #888; }
    .summary { display: flex; justify-content: center; gap: 20px; padding: 8px 12px 12px; font-size: 15px; font-weight: 700; }
    .summary .s-ok { color: #00d26a; }
    .summary .s-trouble { color: #e74c3c; }
    .summary .s-missing { color: #666; }
  </style>
</head>
<body class="state-loading">
  <div class="header loading" id="header">
    <div class="icon" id="h-icon">⏳</div>
    <div class="text" id="h-text">Sending...</div>
    <div class="sub" id="h-sub">Reporting your status</div>
  </div>
  <button class="change-btn" id="change-btn" onclick="toggleStatus()"></button>
  <div class="error" id="error"></div>
  <div class="circle-status" id="circle-status" style="display:none">
    <div class="summary" id="summary"></div>
    <div id="member-list"></div>
  </div>

  <script>
    const memberId = location.pathname.split('/trouble/')[1];
    let circleId = null;
    let currentStatus = 'trouble';

    async function report(status) {
      try {
        const res = await fetch(`/api/checkin/${memberId}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status }),
        });
        if (res.ok) {
          currentStatus = status;
          updateUI();
          if (navigator.vibrate) navigator.vibrate(status === 'ok' ? 200 : [200, 100, 200]);
          if (!circleId) {
            await loadCircleInfo();
            setInterval(pollStatus, 3000);
          }
          pollStatus();
        } else {
          const err = await res.json();
          if (err.error === 'No active check-in event') {
            setHeader('⚫', 'No active alert', 'No check-in is active right now', 'loading');
          } else {
            showError(err.error);
          }
        }
      } catch (e) {
        showError('Network error. Check your connection.');
      }
    }

    function updateUI() {
      if (currentStatus === 'ok') {
        setHeader('✅', "You're OK", '', 'ok');
        document.body.className = 'state-ok';
        const btn = document.getElementById('change-btn');
        btn.textContent = '🔴 Change to Trouble';
        btn.className = 'change-btn to-trouble';
        btn.style.display = 'block';
      } else {
        setHeader('🔴', 'Trouble Reported', 'Your circle has been notified', 'trouble');
        document.body.className = 'state-trouble';
        const btn = document.getElementById('change-btn');
        btn.textContent = "✅ Change to I'm OK";
        btn.className = 'change-btn to-ok';
        btn.style.display = 'block';
      }
    }

    function setHeader(icon, text, sub, cls) {
      document.getElementById('h-icon').textContent = icon;
      document.getElementById('h-text').textContent = text;
      document.getElementById('h-sub').textContent = sub;
      const header = document.getElementById('header');
      header.className = 'header ' + cls;
    }

    function toggleStatus() {
      report(currentStatus === 'ok' ? 'trouble' : 'ok');
    }

    async function loadCircleInfo() {
      const res = await fetch(`/api/member-info/${memberId}`);
      if (res.ok) {
        const info = await res.json();
        circleId = info.circleId;
      }
    }

    async function pollStatus() {
      if (!circleId) return;
      try {
        const res = await fetch(`/api/circles/${circleId}/status`);
        const data = await res.json();
        if (!data.active) return;
        renderStatus(data.members);
      } catch (e) {}
    }

    function renderStatus(members) {
      document.getElementById('circle-status').style.display = 'block';
      const ok = members.filter(m => m.status === 'ok');
      const trouble = members.filter(m => m.status === 'trouble');
      const unknown = members.filter(m => m.status === 'unknown');

      document.getElementById('summary').innerHTML =
        `<span class="s-ok">${ok.length} OK</span>` +
        `<span class="s-trouble">${trouble.length} Trouble</span>` +
        `<span class="s-missing">${unknown.length} Missing</span>`;

      const sorted = [...trouble, ...unknown, ...ok];
      document.getElementById('member-list').innerHTML = sorted.map(m => {
        const icon = m.status === 'ok' ? '✅' : m.status === 'trouble' ? '🔴' : '⚫';
        const time = m.time ? new Date(m.time).toLocaleTimeString() : '';
        return `<div class="member-row ${m.status}">
          <span class="member-icon">${icon}</span>
          <span class="member-name">${m.name}</span>
          <span class="member-time">${time}</span>
        </div>`;
      }).join('');
    }

    function showError(msg) {
      setHeader('❌', 'Error', '', 'loading');
      const el = document.getElementById('error');
      el.textContent = msg;
      el.style.display = 'block';
    }

    report('trouble');
  </script>
</body>
</html>
